name: Build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: sudo apt-get update && sudo apt-get install -y mingw-w64
      - name: Build_EXE
        run: |
          # 1. Создаем базу со всеми нужными именами
          echo "#define LOCKED 1" > main.c
          echo "#define ACTIVE 1" >> main.c
          echo "int loonsun_state=1, XY_Background_pos=0, XY_VideoBackground_stream=0, XY_WindowGeometry_rect=0;" >> main.c
          echo "int XY_Cursor_hotspot=0, XY_Font_kerning=0, XY_Font_baseline=0, XY_Pet_anchor=0;" >> main.c
          echo "int XY_SoundPuck_coords=0, XY_SystemSounds_trigger=0;" >> main.c
          echo "void anchor_coordinate(){} void log_status(){} void anchor_audio_map(){} void execute_global_lock_all_modules(){}" >> main.c

          # 2. Склеиваем твои файлы, НО удаляем проблемную строку с mesh_bottom_y на лету
          sed '/int mesh_bottom_y =/d' Editor/Redactor/Main-handler/handler/push/handler.git >> main.c
          sed '/int mesh_bottom_y =/d' Editor/Redactor/Main-handler/handler/push/handlir.git >> main.c
          
          echo "int main(){return 0;}" >> main.c

          # 3. Компилируем монолит
          x86_64-w64-mingw32-gcc main.c -o SeriesCG_Editor.exe -static -w -fpermissive
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Build
          path: SeriesCG_Editor.exe
