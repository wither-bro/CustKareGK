name: Build SERIES(CG) Windows Executable

on:
  push:
    branches: [ "main", "master" ]

jobs:
  build_exe:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install MinGW (Windows Compiler)
        run: |
          sudo apt-get update
          sudo apt-get install -y mingw-w64

      - name: Compile Windows .EXE
        run: |
          # Собираем всё в один файл SeriesCG_Editor.exe
          # Используем флаг -static, чтобы все библиотеки были внутри файла
          x86_64-w64-mingw32-gcc -x c \
            Editor/Redactor/Main-handler/handler/push/handler.git \
            Editor/Redactor/Main-handler/handler/push/handlir.git \
            -o SeriesCG_Editor.exe \
            -static -I./

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: SERIES-CG-Windows-Build
          path: SeriesCG_Editor.exe
          retention-days: 1
