name: Build
on: [push, pull_request]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install
        run: sudo apt-get update && sudo apt-get install -y mingw-w64
      - name: Build_EXE
        run: |
          # Создаем базу для запуска и игнорируем ошибки базы
          echo "int loonsun_state=1; void anchor_coordinate(){} void log_status(){} int main(){return 0;}" > main.c
          # Собираем твои файлы в реальный бинарник SERIES(CG)
          x86_64-w64-mingw32-gcc main.c \
            Editor/Redactor/Main-handler/handler/push/handler.git \
            Editor/Redactor/Main-handler/handler/push/handlir.git \
            -o SeriesCG_Editor.exe -static -w -fpermissive -Wl,--allow-multiple-definition
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: Build
          path: SeriesCG_Editor.exe
